# StormBlock requires io_uring: ublk exports and the target data path are
# io_uring interfaces. RHEL10/Rocky10 ship kernel.io_uring_disabled=2
# (hardening default), which breaks them with "Operation not permitted".
#
# Install to /etc/sysctl.d/ on any node that runs stormblock (the initramfs
# handles early boot itself; this covers the running system after
# switch_root). See issue #14.
kernel.io_uring_disabled = 0
